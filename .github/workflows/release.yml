# Merge to main → version-tag cuts the tag → hand it to the platform to deploy.
#
# NOTHING here runs on the platform's machine. This job runs on GitHub's own VMs and only POSTs. The
# self-hosted runner is registered to platform-cicd alone, so no workflow in this repo — including one
# in a fork — can reach it.
name: release

on:
  push:
    branches: [main] # a merge. main is protected, so the checks are already green.

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - id: version
        name: The tag version-tag put on this commit
        run: |
          set -euo pipefail
          # READ the tag, do NOT recompute it. version-tag.yml cuts the tag for this same merge, and
          # two independent "latest + 1" computations cannot agree — whichever runs second lands one
          # higher and then waits forever for a tag that will never exist. The version on the commit is
          # correct by construction, so wait for it to appear and use exactly that.
          for i in $(seq 1 40); do
            git fetch -q --tags origin
            V="$(git tag --points-at "$GITHUB_SHA" | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1 || true)"
            [ -n "$V" ] && break
            echo "waiting for version-tag to tag this commit ($i)"; sleep 4
          done
          [ -n "${V:-}" ] || { echo "no version tag on $GITHUB_SHA — did version-tag.yml fail?" >&2; exit 1; }
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "this merge is tagged $V"

      - id: pr
        name: PR context for this merge
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # The PR this merge commit came from. `gh` returns [] for a direct push, and every field then
          # falls back to empty — the deploy message simply omits the PR footer. GITHUB_TOKEN can read
          # this repo's own PRs, so no extra credential is needed.
          j="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" \
                 -H 'Accept: application/vnd.github+json' 2>/dev/null || echo '[]')"
          {
            echo "num=$(jq -r '.[0].number // ""' <<<"$j")"
            echo "url=$(jq -r '.[0].html_url // ""' <<<"$j")"
            echo "author=$(jq -r '.[0].user.login // ""' <<<"$j")"
            echo "branch=$(jq -r '.[0].head.ref // ""' <<<"$j")"
          } >> "$GITHUB_OUTPUT"

      - name: Ask the platform to build and deploy
        env:
          TOKEN: ${{ secrets.CICD_DISPATCH_TOKEN }}
          V: ${{ steps.version.outputs.version }}
          PR: ${{ steps.pr.outputs.num }}
          PR_URL: ${{ steps.pr.outputs.url }}
          AUTHOR: ${{ steps.pr.outputs.author }}
          MERGER: ${{ github.actor }}
          BRANCH: ${{ steps.pr.outputs.branch }}
        run: |
          set -euo pipefail
          # GITHUB_TOKEN cannot dispatch across repos, so the fine-grained CICD_DISPATCH_TOKEN (scoped
          # to platform-cicd only) does it. The payload is built with jq so branch/author strings are
          # safely quoted, and every value comes from env — none interpolated into the shell.
          payload="$(jq -n \
            --arg comps 'rs-mcp-server fvt-traffic' \
            --arg repo "$GITHUB_REPOSITORY" \
            --arg v "$V" --arg pr "$PR" --arg url "$PR_URL" \
            --arg author "$AUTHOR" --arg merger "$MERGER" --arg branch "$BRANCH" \
            '{event_type:"release", client_payload:{
               components:$comps, repo:$repo, version:$v,
               pr:$pr, pr_url:$url, author:$author, merger:$merger, branch:$branch}}')"
          curl -fsS -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/AndresI19/platform-cicd/dispatches \
            -d "$payload"
          echo "dispatched rs-mcp-server fvt-traffic $V (PR ${PR:-none})"
