name: tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package + test extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Lint with ruff
        run: ruff check .

      - name: Import smoke test
        run: python -c "from rs_mcp_server import server, cache; from rs_mcp_server.tools import wiki, prices, hiscores, quests"

  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package + test extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run unit tests
        run: pytest tests/ -v
