# Secret scanning with gitleaks, over FULL history (fetch-depth: 0) — a secret is a secret in any
# commit, not just the tip, and rotating it later does not un-leak it. This is the CI-side complement
# to the local pre-commit hook: the hook only protects the machine it runs on, this catches a secret
# pushed from anywhere or arriving in a PR.
name: secret-scan

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        run: |
          set -euo pipefail
          VERSION=8.21.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" | tar -xz gitleaks
          ./gitleaks detect --source . --redact --no-banner --exit-code 1
